<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login / Register | Earn & Grow</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <nav class="navbar navbar-dark bg-dark-gray">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="fa-solid fa-chart-line me-2 text-success"></i>Earn & Grow
      </a>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5">

          <div class="auth-card p-4 shadow rounded bg-white">

            <ul class="nav nav-pills nav-justified mb-4">
              <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login">
                  Login
                </button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#register" id="registerTabBtn">
                  Register
                </button>
              </li>
            </ul>

            <div class="tab-content">

              <div class="tab-pane fade show active" id="login">
                <h4 class="fw-bold text-center mb-1">Welcome Back</h4>
                <p class="text-muted text-center mb-4">Login to your dashboard</p>

                <form action="/login" method="POST">
                  <div class="mb-3 input-group">
                    <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                  </div>

                  <div class="mb-3 input-group">
                    <span class="input-group-text"><i class="fa fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                  </div>

                  <button type="submit" class="btn btn-primary-custom w-100">Login</button>
                </form>
              </div>

              <div class="tab-pane fade" id="register">
                <h4 class="fw-bold text-center mb-1">Create Account</h4>
                <p class="text-muted text-center mb-4">Start your earning journey</p>

                <form action="/register" method="POST">
                  <div class="mb-3 input-group">
                    <span class="input-group-text"><i class="fa fa-user"></i></span>
                    <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                  </div>

                  <div class="mb-3 input-group">
                    <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                  </div>

                  <div class="mb-3 input-group">
                    <span class="input-group-text"><i class="fa fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                  </div>

                  <div class="mb-3 input-group">
                    <span class="input-group-text"><i class="fa fa-share-nodes"></i></span>
                    <input type="text" name="ref" id="refInput" class="form-control" placeholder="Referral Code (Optional)">
                  </div>

                  <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" required>
                    <label class="form-check-label small">
                      I agree to the Terms & Conditions
                    </label>
                  </div>

                  <button type="submit" class="btn btn-primary-custom w-100">Create Account</button>
                </form>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

  <footer class="py-3 text-center">
    <p class="mb-0">© 2026 Earn & Grow. All Rights Reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const refCode = urlParams.get('ref');
    
    if (refCode) {
      // 1. Fill the code in the visible input box
      document.getElementById('refInput').value = refCode;
      
      // 2. Automatically switch to the "Register" tab so the user sees the form
      const triggerEl = document.querySelector('#registerTabBtn');
      const tab = new bootstrap.Tab(triggerEl);
      tab.show();
    }
  </script>

</body>

</html>
