<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal | Earn & Grow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">

<div class="container py-5">
  <div class="card p-4 mx-auto mt-5" style="max-width: 400px; border-radius: 10px;">
    <h3 class="text-center mb-4 text-primary fw-bold">⚙️ Admin Portal</h3>
    
    <form action="/admin/login" method="POST">
      <div class="mb-3">
        <label class="fw-bold">Admin Email</label>
        <input type="email" name="email" class="form-control" required placeholder="admin@example.com">
      </div>
      <div class="mb-4">
        <label class="fw-bold">Password</label>
        <input type="password" name="password" class="form-control" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login to Panel</button>
    </form>
    
  </div>
</div>

</body>
</html>
