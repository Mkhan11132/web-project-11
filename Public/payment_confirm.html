<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Payment | Earn & Grow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="card p-4 mx-auto" style="max-width: 500px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h3 class="text-center mb-4">Submit Payment Details</h3>
    
    <form id="paymentForm">
      <div class="mb-3">
        <label>Full Name</label>
        <input type="text" id="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Transaction ID (TRX ID)</label>
        <input type="text" id="trx_id" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Amount Paid (PKR)</label>
        <input type="number" id="amount" class="form-control" required>
      </div>
      <div class="mb-4">
        <label>Slip / Screenshot Link (Optional)</label>
        <input type="text" id="slip" class="form-control" placeholder="Paste image link here">
      </div>
      
      <input type="hidden" id="plan_id" value="1"> 

      <button type="submit" class="btn btn-success w-100 py-2">Submit Payment for Approval</button>
    </form>

    <div id="message" class="mt-3 text-center fw-bold"></div>
  </div>
</div>

<script>
  // This JavaScript handles the form submission and sends data to the server
  document.getElementById('paymentForm').addEventListener('submit', async function(event) {
    event.preventDefault(); // Prevent the page from refreshing

    // 1. Gather the data from the form
    const paymentData = {
      plan_id: document.getElementById('plan_id').value,
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      trx_id: document.getElementById('trx_id').value,
      amount: document.getElementById('amount').value,
      slip: document.getElementById('slip').value
    };

    try {
      // 2. Send the data to your backend route
      const response = await fetch('/submit-payment', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(paymentData)
      });

      const result = await response.json();

      // 3. Handle the server's reply
      const messageBox = document.getElementById('message');
      
      if (result.success) {
        messageBox.style.color = "green";
        messageBox.innerText = "Payment submitted successfully! Waiting for Admin approval.";
        
        // Redirect back to dashboard after 2 seconds
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 2000);
      } else {
        messageBox.style.color = "red";
        messageBox.innerText = result.error || "Failed to submit payment.";
      }
      
    } catch (error) {
      console.error("Error:", error);
      document.getElementById('message').innerText = "An error occurred. Please try again.";
    }
  });
</script>

</body>
</html>
